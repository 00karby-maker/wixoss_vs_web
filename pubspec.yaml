name: wixoss_vs
description: wixoss record app
publish_to: 'none'

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  hive: ^2.2.3
  hive_flutter: ^1.1.0
  fl_chart: ^0.66.0
  animations: ^2.0.8
  path_provider: ^2.1.2
  provider: ^6.0.5
  firebase_core: ^2.30.0
  firebase_storage: ^11.7.0
  image_picker: ^1.1.2

dev_dependencies:
  hive_generator: ^2.0.1
  build_runner: ^2.4.6
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/help/input_1.png
    - assets/help/input_2.png
    - assets/help/input_3.png
    - assets/help/input_4.png
    - assets/help/search_1.png
    - assets/help/search_2.png
    - assets/help/search_3.png
    - assets/help/search_4.png
    - assets/help/edit_1.png
    - assets/help/edit_2.png
    - assets/help/history_1.png
    - assets/help/history_2.png
    - assets/help/history_3.png
    - assets/help/stats_1.png
    - assets/help/stats_2.png
    - assets/help/stats_3.png
    - assets/help/stats_4.png
    - assets/help/stats_5.png
    - assets/help/stats_6.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/appicon.png"
